<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Monad liquid staking pools abstract cover</title>
  <desc id="desc">Abstract purple and black Web3 infrastructure cover showing liquid staking pools, validator nodes, and routing streams.</desc>
  <defs>
    <radialGradient id="bg-a" cx="26%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#6d4dff" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#2a135f" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#05030b" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="bg-b" cx="82%" cy="24%" r="64%">
      <stop offset="0%" stop-color="#c15dff" stop-opacity="0.38"/>
      <stop offset="48%" stop-color="#311153" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#05030b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stream" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0"/>
      <stop offset="22%" stop-color="#9b7cff" stop-opacity="0.9"/>
      <stop offset="52%" stop-color="#f28cff" stop-opacity="0.98"/>
      <stop offset="82%" stop-color="#8af7ff" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#8af7ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f08cff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#7c5cff" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#00d8ff" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.40  0 1 0 0 0.16  0 0 1 0 1.00  0 0 0 0.72 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="fine-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="#a991ff" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#05030b"/>
  <rect width="1600" height="900" fill="url(#bg-a)"/>
  <rect width="1600" height="900" fill="url(#bg-b)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <g opacity="0.28">
    <path d="M-80 702 C 210 602, 340 760, 574 626 S 1018 428, 1710 590" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.4"/>
    <path d="M-70 730 C 238 638, 360 790, 596 654 S 1060 454, 1690 628" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.1"/>
    <path d="M-40 760 C 256 684, 428 816, 650 696 S 1120 510, 1680 684" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  </g>

  <g filter="url(#soft-glow)">
    <path d="M132 596 C 330 466, 436 676, 602 536 C 746 414, 884 392, 1038 480 C 1190 566, 1286 466, 1476 364" fill="none" stroke="url(#stream)" stroke-width="26" stroke-linecap="round"/>
    <path d="M100 657 C 334 590, 498 734, 690 602 C 830 506, 990 518, 1164 618 C 1298 694, 1410 654, 1528 580" fill="none" stroke="url(#stream)" stroke-width="14" stroke-linecap="round" opacity="0.74"/>
    <path d="M214 398 C 394 308, 524 382, 668 314 C 838 236, 1004 242, 1162 332 C 1268 392, 1374 374, 1490 300" fill="none" stroke="url(#stream)" stroke-width="10" stroke-linecap="round" opacity="0.58"/>
  </g>

  <g opacity="0.8">
    <ellipse cx="448" cy="654" rx="210" ry="54" fill="#110927" stroke="#9b7cff" stroke-opacity="0.36" stroke-width="2"/>
    <ellipse cx="448" cy="646" rx="166" ry="35" fill="url(#pool)" opacity="0.68"/>
    <ellipse cx="1118" cy="610" rx="252" ry="68" fill="#110927" stroke="#9b7cff" stroke-opacity="0.34" stroke-width="2"/>
    <ellipse cx="1118" cy="598" rx="198" ry="42" fill="url(#pool)" opacity="0.60"/>
    <ellipse cx="806" cy="426" rx="178" ry="48" fill="#110927" stroke="#9b7cff" stroke-opacity="0.31" stroke-width="2"/>
    <ellipse cx="806" cy="420" rx="138" ry="30" fill="url(#pool)" opacity="0.54"/>
  </g>

  <g filter="url(#fine-glow)">
    <circle cx="448" cy="646" r="18" fill="#f08cff"/>
    <circle cx="806" cy="420" r="16" fill="#8af7ff"/>
    <circle cx="1118" cy="598" r="20" fill="#f08cff"/>
    <circle cx="612" cy="536" r="10" fill="#cdbbff"/>
    <circle cx="1018" cy="480" r="11" fill="#cdbbff"/>
    <circle cx="1324" cy="460" r="9" fill="#8af7ff"/>
    <circle cx="306" cy="512" r="8" fill="#8af7ff"/>
  </g>

  <g fill="none" stroke="#cdbbff" stroke-opacity="0.42" stroke-width="1.8">
    <path d="M448 646 L612 536 L806 420 L1018 480 L1118 598"/>
    <path d="M806 420 L1324 460 L1118 598"/>
    <path d="M306 512 L448 646 L806 420"/>
  </g>

  <g opacity="0.68">
    <rect x="248" y="238" width="154" height="154" rx="28" fill="#100823" stroke="#9b7cff" stroke-opacity="0.38"/>
    <rect x="280" y="270" width="90" height="90" rx="20" fill="#2a135f" stroke="#cdbbff" stroke-opacity="0.3"/>
    <rect x="1204" y="214" width="166" height="166" rx="32" fill="#100823" stroke="#9b7cff" stroke-opacity="0.36"/>
    <rect x="1240" y="250" width="94" height="94" rx="22" fill="#2a135f" stroke="#cdbbff" stroke-opacity="0.28"/>
    <rect x="684" y="210" width="132" height="132" rx="26" fill="#100823" stroke="#9b7cff" stroke-opacity="0.28"/>
    <rect x="713" y="239" width="74" height="74" rx="18" fill="#2a135f" stroke="#cdbbff" stroke-opacity="0.24"/>
  </g>

  <g opacity="0.18">
    <circle cx="1360" cy="742" r="190" fill="none" stroke="#f08cff" stroke-width="2"/>
    <circle cx="1360" cy="742" r="132" fill="none" stroke="#8af7ff" stroke-width="1.5"/>
    <circle cx="206" cy="178" r="150" fill="none" stroke="#8af7ff" stroke-width="1.5"/>
    <circle cx="206" cy="178" r="96" fill="none" stroke="#f08cff" stroke-width="1.3"/>
  </g>
</svg>
